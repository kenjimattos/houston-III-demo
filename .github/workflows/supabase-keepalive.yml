name: Supabase keepalive

# Free tier do Supabase pausa projetos após ~1 semana sem atividade.
# Este ping semanal mantém o projeto "Houston III Demo" ativo.
on:
  schedule:
    - cron: "0 12 * * 1,4" # segundas e quintas às 12:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping REST API
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/hospitais?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "HTTP $code"
          [ "$code" = "200" ] || exit 1
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
